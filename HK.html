<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇妙港澳之旅 - 旅遊手帳</title>
    
    <!-- 核心載入 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase 模組 -->
    <script type="module">
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        window.FB_LIB = { initializeApp, getApp, getApps, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F7F4EB; color: #212121; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .mickey-card { background: white; border: 2px solid #212121; border-radius: 24px; box-shadow: 4px 4px 0px #E0E5D5; overflow: hidden; }
        .mickey-btn { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .mickey-btn:active { transform: scale(0.92); }
        
        .animate-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 導覽列容器 - 確保置中且比例正確 */
        .nav-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            z-index: 150;
        }

        .tab-active { color: #D32F2F; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 核心圖標組件 ---
        const Icon = ({ name, className = "w-5 h-5", color = "currentColor" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", "24"); svg.setAttribute("height", "24"); svg.setAttribute("viewBox", "0 0 24 24");
                        svg.setAttribute("fill", "none"); svg.setAttribute("stroke", color); svg.setAttribute("stroke-width", "2.5");
                        svg.setAttribute("stroke-linecap", "round"); svg.setAttribute("stroke-linejoin", "round");
                        svg.setAttribute("class", `lucide lucide-${name.toLowerCase()} ${className}`);
                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
                            svg.appendChild(element);
                        });
                        containerRef.current.appendChild(svg);
                    }
                }
            }, [name, className, color]);
            return <span ref={containerRef} className="inline-flex items-center justify-center" />;
        };

        // --- 子組件定義 ---

        const MapPreview = ({ location }) => {
            if (!location || location.trim() === "") {
                return (
                    <div className="w-full h-40 bg-gray-100 rounded-2xl flex flex-col items-center justify-center border-2 border-dashed border-gray-300">
                        <Icon name="MapPin" className="w-8 h-8 text-gray-300 mb-2" />
                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">輸入地點預覽地圖</p>
                    </div>
                );
            }
            const encodedLocation = encodeURIComponent(location);
            const mapUrl = `https://maps.google.com/maps?q=${encodedLocation}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
            return (
                <div className="w-full h-48 rounded-2xl overflow-hidden border-2 border-[#212121]/10 shadow-inner">
                    <iframe title="Map" width="100%" height="100%" frameBorder="0" src={mapUrl} />
                </div>
            );
        };

        const TravelHeader = ({ title, subtitle, startDate }) => {
            const [daysLeft, setDaysLeft] = useState(0);
            useEffect(() => {
                const start = new Date(startDate);
                const now = new Date();
                const diff = Math.ceil((start - now) / (1000 * 60 * 60 * 24));
                setDaysLeft(diff > 0 ? diff : 0);
            }, [startDate]);
            return (
                <div className="pt-10 pb-6 px-6 relative overflow-hidden text-[#212121]">
                    <div className="absolute top-[-20px] left-[-20px] w-32 h-32 bg-[#FFC107]/10 rounded-full blur-3xl -z-10" />
                    <div className="relative mb-8">
                        <div className="bg-[#D32F2F] rounded-2xl p-4 shadow-[6px_6px_0px_#212121] flex items-center justify-between border-2 border-[#212121]">
                            <div className="absolute left-[-10px] top-1/2 -translate-y-1/2 w-5 h-5 bg-[#F7F4EB] rounded-full border-2 border-[#212121]" />
                            <div className="flex items-center gap-4 pl-4 text-white text-left">
                                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center border-2 border-[#212121] rotate-[-5deg] flex-shrink-0"><Icon name="Plane" color="#D32F2F" className="w-6 h-6" /></div>
                                <div>
                                    <p className="text-[9px] font-bold tracking-[0.2em] opacity-80 uppercase leading-none mb-1">Boarding Countdown</p>
                                    <p className="text-2xl font-black italic tracking-tighter uppercase leading-none">TRAVEL IN {daysLeft} DAYS</p>
                                </div>
                            </div>
                            <div className="pr-2"><div className="bg-[#FFC107] text-[#212121] px-3 py-1 rounded-full text-[10px] font-black border-2 border-[#212121] shadow-sm">{startDate.replace(/-/g, '/')}</div></div>
                            <div className="absolute right-[-10px] top-1/2 -translate-y-1/2 w-5 h-5 bg-[#F7F4EB] rounded-full border-2 border-[#212121]" />
                        </div>
                    </div>
                    <div className="flex justify-between items-start text-left">
                        <div>
                            <h1 className="text-4xl font-black tracking-tight flex items-center gap-2">{title}<span className="bg-[#D32F2F] text-white text-[10px] px-2 py-0.5 rounded-sm -rotate-6 border border-[#212121]">OFFICIAL</span></h1>
                            <div className="flex items-center gap-2 mt-1"><span className="w-6 h-0.5 bg-[#212121]" /><p className="text-[#212121]/50 text-xs font-bold uppercase tracking-widest italic">{subtitle}</p></div>
                        </div>
                        <div className="w-14 h-14 rounded-full border-2 border-[#212121] bg-white overflow-hidden shadow-[4px_4px_0px_#212121] flex flex-col flex-shrink-0">
                            <div className="h-1/2 bg-[#212121] flex items-center justify-center gap-1"><div className="w-1.5 h-1.5 bg-white rounded-full"/><div className="w-1.5 h-1.5 bg-white rounded-full"/></div>
                            <div className="h-1/2 bg-[#D32F2F]"/>
                        </div>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 animate-up text-[#212121]">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose} />
                    <div className="relative w-full max-w-lg bg-[#F7F4EB] rounded-t-[32px] sm:rounded-[32px] shadow-2xl overflow-hidden border-t-4 border-[#FFC107]">
                        <div className="px-6 py-4 flex justify-between items-center border-b bg-white/50">
                            <h2 className="text-xl font-black">{title}</h2>
                            <button onClick={onClose} className="p-2 bg-gray-100 rounded-full mickey-btn"><Icon name="X" /></button>
                        </div>
                        <div className="p-6 max-h-[80vh] overflow-y-auto no-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };

        const BoardingPass = ({ flight, type }) => (
            <div className="mickey-card mb-4 text-[#212121]">
                <div className={`${type === 'outbound' ? 'bg-[#D32F2F]' : 'bg-[#212121]'} p-3 text-white flex justify-between items-center`}>
                    <div className="flex items-center gap-2"><Icon name="Plane" color="white"/><span className="text-[10px] font-black uppercase tracking-widest">{flight.airline}</span></div>
                    <span className="text-[9px] font-bold opacity-80 uppercase bg-white/20 px-2 py-0.5 rounded-full">{type === 'outbound' ? '去程' : '回程'}</span>
                </div>
                <div className="p-5 text-left text-[#212121]">
                    <div className="flex justify-between items-center mb-4">
                        <div className="text-left w-20"><p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">FROM</p><h3 className="text-2xl font-black leading-none">{flight.fromCode}</h3></div>
                        <div className="flex-1 px-4 relative flex items-center justify-center">
                            <div className="w-full border-t-2 border-dashed border-gray-200" />
                            <div className="bg-white absolute px-2 py-0.5 border rounded-full text-[9px] font-black text-[#D32F2F]">{flight.flightNo}</div>
                        </div>
                        <div className="text-right w-20"><p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">TO</p><h3 className="text-2xl font-black leading-none">{flight.toCode}</h3></div>
                    </div>
                    <div className="grid grid-cols-3 gap-2 border-t border-gray-50 pt-3 text-center text-[11px] font-black">
                        <div><p className="text-[8px] text-gray-400 uppercase tracking-tighter">DATE</p>{flight.date}</div>
                        <div><p className="text-[8px] text-gray-400 uppercase tracking-tighter">TIME</p>{flight.time}</div>
                        <div><p className="text-[8px] text-gray-400 uppercase tracking-tighter">GATE</p>{flight.terminal}</div>
                    </div>
                </div>
            </div>
        );

        const StayCard = ({ stay, onEdit }) => {
            const perPerson = Math.round(stay.totalPrice / (stay.guests || 1)).toLocaleString();
            return (
                <div className="mickey-card mb-4 overflow-hidden text-left">
                    <div className="h-32 bg-gray-200 relative">
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent" />
                        <div className="absolute top-3 left-3 bg-[#FFC107] text-[#212121] px-3 py-1 rounded-full text-[9px] font-black border-2 border-[#212121] shadow-sm uppercase">Hotel</div>
                        <button onClick={onEdit} className="absolute top-3 right-3 w-8 h-8 bg-white rounded-xl flex items-center justify-center border-2 border-[#212121] shadow-md mickey-btn"><Icon name="Edit3" color="#212121" /></button>
                        <div className="absolute bottom-3 left-3 text-white pr-4 text-left">
                            <h3 className="text-lg font-black leading-tight">{stay.name}</h3>
                            <p className="text-[9px] font-bold opacity-90 flex items-center gap-1 mt-0.5 text-left"><Icon name="MapPin" className="w-2.5 h-2.5" color="#FFC107" /> {stay.address}</p>
                        </div>
                    </div>
                    <div className="p-4 text-[#212121]">
                        <div className="flex justify-between items-center mb-4 text-[#212121]">
                            <div className="text-center flex-1"><p className="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">Check In</p><p className="font-black text-md">{stay.checkIn}</p></div>
                            <div className="w-8 h-8 bg-[#F7F4EB] rounded-full flex items-center justify-center border border-gray-100"><Icon name="Hotel" color="#D32F2F" /></div>
                            <div className="text-center flex-1"><p className="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">Check Out</p><p className="font-black text-md">{stay.checkOut}</p></div>
                        </div>
                        <div className="bg-[#F7F4EB] rounded-xl p-3 border border-[#212121]/5">
                            <div className="flex justify-between items-center mb-2"><div className="flex items-center gap-2 text-gray-500 text-left"><Icon name="Users" /> <span className="text-[10px] font-bold">總價 ({stay.guests} 人)</span></div><p className="text-[10px] font-black text-[#D32F2F]">HKD ${stay.totalPrice?.toLocaleString()}</p></div>
                            <div className="flex justify-between items-center pt-2 border-t border-dashed border-gray-200 text-[#212121]"><span className="text-[10px] font-black">每人預計</span><p className="text-md font-black">HKD ${perPerson}</p></div>
                        </div>
                    </div>
                </div>
            );
        };

        const expenseCats = {
            food: { label: '美食', color: 'bg-[#FF8A65]', icon: "Utensils" },
            transport: { label: '交通', color: 'bg-[#64B5F6]', icon: "Navigation" },
            shopping: { label: '購物', color: 'bg-[#FFC107]', icon: "ShoppingBag" },
            attraction: { label: '門票', color: 'bg-[#81C784]', icon: "Ticket" },
            other: { label: '其他', color: 'bg-gray-400', icon: "HelpCircle" },
        };

        // --- 主程式 App ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('schedule');
            const [selectedDate, setSelectedDate] = useState('2026-09-16');
            const [modalMode, setModalMode] = useState(null);
            const [itinerary, setItinerary] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [vouchers, setVouchers] = useState([]);
            const [planningTasks, setPlanningTasks] = useState([]);
            const [stayInfo, setStayInfo] = useState({ name: '皇家帝苑酒店', address: '尖沙咀東部麼地道69號', checkIn: '09/16', checkOut: '09/19', totalPrice: 4200, guests: 3 });
            const [exchangeRates, setExchangeRates] = useState({ HKD: 4.12, MOP: 4.00, lastUpdated: '--' });
            
            const [formData, setFormData] = useState({ title: '', time: '09:00', type: 'spot', location: '', note: '' });
            const [expenseFormData, setExpenseFormData] = useState({ title: '', amount: '', currency: 'HKD', category: 'food', date: '2026-09-16', payer: 'Me' });
            const [voucherFormData, setVoucherFormData] = useState({ title: '', date: '09/16', type: 'QR Code', link: '', fileInfo: null });
            const [hotelFormData, setHotelFormData] = useState({ name: '', address: '', checkIn: '', checkOut: '', totalPrice: 0, guests: 1 });
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedExpense, setSelectedExpense] = useState(null);
            const [planningMode, setPlanningMode] = useState('todo'); 
            const [newTaskInput, setNewTaskInput] = useState('');
            const fileInputRef = useRef(null);

            // Firebase 初始化
            useEffect(() => {
                const init = async () => {
                    const { FB_LIB } = window; if (!FB_LIB) return;
                    const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
                    const config = JSON.parse(configStr);
                    if (!config.apiKey) return;
                    let fbApp = FB_LIB.getApps().length === 0 ? FB_LIB.initializeApp(config) : FB_LIB.getApp();
                    const auth = FB_LIB.getAuth(fbApp);
                    const db = FB_LIB.getFirestore(fbApp);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';

                    FB_LIB.onAuthStateChanged(auth, async (u) => {
                        if (!u) { await FB_LIB.signInAnonymously(auth); }
                        else {
                            setUser(u);
                            const path = `artifacts/${appId}/users/${u.uid}`;
                            FB_LIB.onSnapshot(FB_LIB.collection(db, `${path}/itinerary`), s => setItinerary(s.docs.map(d => ({...d.data(), id: d.id}))));
                            FB_LIB.onSnapshot(FB_LIB.collection(db, `${path}/expenses`), s => setExpenses(s.docs.map(d => ({...d.data(), id: d.id}))));
                            FB_LIB.onSnapshot(FB_LIB.collection(db, `${path}/vouchers`), s => setVouchers(s.docs.map(d => ({...d.data(), id: d.id}))));
                            FB_LIB.onSnapshot(FB_LIB.collection(db, `${path}/planningTasks`), s => setPlanningTasks(s.docs.map(d => ({...d.data(), id: d.id}))));
                            FB_LIB.onSnapshot(FB_LIB.doc(db, `${path}/settings/stayInfo`), s => {
                                if(s.exists()) { setStayInfo(s.data()); setHotelFormData(s.data()); }
                            });
                        }
                    });
                };
                init();
            }, []);

            // 匯率
            useEffect(() => {
                fetch('https://open.er-api.com/v6/latest/TWD').then(r => r.json()).then(d => {
                    if (d.rates) setExchangeRates({ HKD: parseFloat((1/d.rates.HKD).toFixed(2)), MOP: parseFloat((1/d.rates.MOP).toFixed(2)), lastUpdated: new Date().toLocaleDateString() });
                });
            }, []);

            // --- 寫入邏輯 ---
            const handleSaveItem = async (e) => {
                e.preventDefault(); if (!user) return;
                const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                const path = `artifacts/${appId}/users/${user.uid}/itinerary`;
                if (modalMode === 'add') await FB_LIB.addDoc(FB_LIB.collection(db, path), { ...formData, date: selectedDate });
                else await FB_LIB.updateDoc(FB_LIB.doc(db, path, selectedItem.id), formData);
                setModalMode(null);
            };

            const handleSaveExpense = async (e) => {
                e.preventDefault(); if (!user) return;
                const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                const path = `artifacts/${appId}/users/${user.uid}/expenses`;
                if (modalMode === 'addExpense') await FB_LIB.addDoc(FB_LIB.collection(db, path), expenseFormData);
                else await FB_LIB.updateDoc(FB_LIB.doc(db, path, selectedExpense.id), expenseFormData);
                setModalMode(null);
            };

            const handleSaveHotel = async (e) => {
                e.preventDefault(); if (!user) return;
                const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                await FB_LIB.setDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/settings/stayInfo`), hotelFormData);
                setModalMode(null);
            };

            const handleSaveVoucher = async (e) => {
                e.preventDefault(); if (!user) return;
                const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                const path = `artifacts/${appId}/users/${user.uid}/vouchers`;
                const clean = {...voucherFormData, fileName: voucherFormData.fileInfo?.name || null }; delete clean.fileInfo;
                await FB_LIB.addDoc(FB_LIB.collection(db, path), clean);
                setModalMode(null);
            };

            // 修正：樂觀更新（Optimistic UI）新增任務，消除延遲感
            const addTask = async (e) => {
                if(e) e.preventDefault();
                const title = newTaskInput.trim();
                if (!user || !title) return;

                const category = planningMode;
                const createdAt = Date.now();
                const tempId = 'temp-' + createdAt;

                // 1. 立即更新本地狀態（樂觀更新）
                const newItem = { id: tempId, title, completed: false, category, createdAt };
                setPlanningTasks(prev => [newItem, ...prev]);
                setNewTaskInput(''); // 立即清空輸入框

                // 2. 背景非同步寫入雲端
                try {
                    const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                    await FB_LIB.addDoc(FB_LIB.collection(db, `artifacts/${appId}/users/${user.uid}/planningTasks`), { 
                        title, completed: false, category, createdAt 
                    });
                } catch (err) {
                    console.error("Sync failed", err);
                    // 失敗時可選回滾
                }
            };

            const toggleTask = async (task) => {
                if (!user) return;
                // 本地立即切換狀態
                setPlanningTasks(prev => prev.map(t => t.id === task.id ? {...t, completed: !t.completed} : t));
                
                const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                await FB_LIB.updateDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/planningTasks`, task.id), { completed: !task.completed });
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) setVoucherFormData({ ...voucherFormData, fileInfo: { name: file.name, type: file.type, size: (file.size / 1024).toFixed(1) + ' KB' } });
            };

            const totalSpent = Math.round(expenses.reduce((s, e) => s + (Number(e.amount) * (exchangeRates[e.currency] || 1)), 0));
            const dailyItems = itinerary.filter(i => i.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time));

            if (!user) return <div className="h-screen flex items-center justify-center font-black text-[#D32F2F] animate-pulse text-2xl uppercase tracking-tighter">Adventure Opening...</div>;

            return (
                <div className="max-w-md mx-auto pb-40 text-[#212121]">
                    <TravelHeader title="港澳手帳" subtitle="Adventure 2026" startDate="2026-09-16" />

                    {activeTab === 'schedule' && (
                        <div className="px-6 animate-up">
                            <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6">
                                {['16','17','18','19'].map(d => (
                                    <button key={d} onClick={() => setSelectedDate(`2026-09-${d}`)} className={`flex-shrink-0 w-14 h-16 rounded-2xl font-black border-2 transition-all ${selectedDate.endsWith(d) ? 'bg-[#212121] text-white shadow-lg' : 'bg-white text-gray-300 border-transparent'}`}>
                                        <p className="text-[9px] opacity-60 uppercase">SEP</p>{d}
                                    </button>
                                ))}
                            </div>
                            <div className="flex justify-between items-center mb-6 text-left">
                                <h2 className="font-black text-xl tracking-tight">今日行程安排</h2>
                                <button onClick={() => {setFormData({title:'', time:'09:00', type:'spot', location:'', note:''}); setModalMode('add');}} className="w-10 h-10 bg-[#FFC107] border-2 border-[#212121] rounded-full flex items-center justify-center mickey-btn shadow-[3px_3px_0px_#212121]"><Icon name="Plus"/></button>
                            </div>
                            {dailyItems.length > 0 ? dailyItems.map(item => (
                                <div key={item.id} className="relative pl-10 pb-8 group text-left" onClick={() => {setSelectedItem(item); setModalMode('detail');}}>
                                    <div className="absolute left-[13px] top-2 bottom-0 w-0.5 bg-gray-200 group-last:hidden" />
                                    <div className={`absolute left-0 top-1.5 w-7 h-7 bg-[#D32F2F] rounded-full border-4 border-white shadow-sm flex items-center justify-center`}>
                                        <Icon name="MapPin" color="white" className="w-3 h-3"/>
                                    </div>
                                    <div className="mickey-card p-4 mickey-btn bg-white shadow-md">
                                        <div className="flex justify-between items-start mb-1 text-[10px] font-bold text-gray-400 uppercase">
                                            <span className="flex items-center gap-1 text-left"><Icon name="Clock" className="w-3 h-3"/>{item.time}</span>
                                            <span className="bg-[#81C784] text-white px-2 py-0.5 rounded-full">{item.type}</span>
                                        </div>
                                        <h3 className="font-black text-[#212121] text-lg text-left">{item.title}</h3>
                                        <p className="text-[11px] text-gray-500 mt-1 line-clamp-1 text-left">{item.location}</p>
                                    </div>
                                </div>
                            )) : <div className="py-20 text-center opacity-10 font-black italic">No records yet.</div>}
                        </div>
                    )}

                    {activeTab === 'expense' && (
                        <div className="px-6 animate-up text-left">
                            <div className="bg-[#212121] rounded-[32px] p-8 text-white mb-8 border-2 border-[#D32F2F] shadow-xl relative overflow-hidden">
                                <div className="absolute top-[-20px] right-[-20px] w-32 h-32 bg-[#D32F2F] rounded-full opacity-10 blur-2xl" />
                                <div className="flex justify-between items-start mb-4">
                                    <div><p className="text-[10px] font-bold opacity-60 uppercase tracking-widest text-left">Total Spent 累計支出</p><h2 className="text-5xl font-black italic text-[#FFC107] mt-1">${totalSpent.toLocaleString()}</h2></div>
                                    <Icon name="Wallet" className="w-10 h-10" color="white" />
                                </div>
                                <div className="flex gap-4 mt-6 pt-4 border-t border-white/10 text-[10px] font-black opacity-60 uppercase text-white">
                                    <span>1 HKD ≈ {exchangeRates.HKD}</span>
                                    <span>1 MOP ≈ {exchangeRates.MOP}</span>
                                </div>
                            </div>
                            <div className="flex justify-between items-center mb-6 text-[#212121]">
                                <h2 className="font-black text-xl tracking-tight text-left">支出明細</h2>
                                <button onClick={() => {setExpenseFormData({title:'', amount:'', currency:'HKD', category:'food', date:'2026-09-16', payer:'Me'}); setModalMode('addExpense');}} className="w-10 h-10 bg-[#FFC107] border-2 border-[#212121] rounded-full flex items-center justify-center mickey-btn shadow-[3px_3px_0px_#212121]"><Icon name="Plus"/></button>
                            </div>
                            <div className="space-y-4">
                                {expenses.map(e => {
                                    const cat = expenseCats[e.category] || expenseCats.other;
                                    return (
                                        <div key={e.id} onClick={() => { setSelectedExpense(e); setExpenseFormData(e); setModalMode('editExpense'); }} className="mickey-card p-4 flex justify-between items-center bg-white mickey-btn">
                                            <div className="flex items-center gap-4 text-left">
                                                <div className={`w-12 h-12 rounded-2xl ${cat.color} flex items-center justify-center text-white shadow-sm flex-shrink-0`}><Icon name={cat.icon}/></div>
                                                <div className="text-left text-[#212121]"><h4 className="font-black text-sm">{e.title}</h4><p className="text-[10px] font-bold text-gray-400 mt-0.5 uppercase">{e.date?.split('-').slice(1).join('/')} · {e.currency} · {e.payer}</p></div>
                                            </div>
                                            <div className="text-right flex-shrink-0 text-[#212121]">
                                                <p className="text-lg font-black leading-none italic">${e.amount}</p>
                                                <p className="text-[9px] font-bold text-[#D32F2F] mt-1 opacity-80 flex items-center justify-end gap-1"><Icon name="ArrowRightLeft" className="w-2.5 h-2.5" /> ≈ NT${Math.round(e.amount * (exchangeRates[e.currency] || 1))}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {activeTab === 'bookings' && (
                        <div className="px-6 animate-up">
                            <BoardingPass type="outbound" flight={{ airline: 'EVA AIR 長榮', fromCode: 'TPE', toCode: 'HKG', date: '09/16', time: '07:00', flightNo: 'BR891', terminal: 'T2' }} />
                            <BoardingPass type="return" flight={{ airline: 'EVA AIR 長榮', fromCode: 'HKG', toCode: 'TPE', date: '09/19', time: '21:05', flightNo: 'BR858', terminal: 'T1' }} />
                            <StayCard stay={stayInfo} onEdit={() => setModalMode('editHotel')} />
                            
                            <div className="flex justify-between items-center mb-4 mt-8 text-left text-[#212121]">
                                <h2 className="font-black text-xl tracking-tight">門票與憑證</h2>
                                <button onClick={() => {setVoucherFormData({title:'', date:'09/16', type:'QR Code', link:'', fileInfo: null}); setModalMode('addVoucher');}} className="w-10 h-10 bg-[#FFC107] border-2 border-[#212121] rounded-full flex items-center justify-center mickey-btn shadow-[3px_3px_0px_#212121]"><Icon name="Plus"/></button>
                            </div>
                            <div className="space-y-3">
                                {vouchers.map(v => (
                                    <div key={v.id} className="mickey-card p-4 flex justify-between items-center bg-white group text-left text-[#212121]">
                                        <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => v.link && window.open(v.link, '_blank')}>
                                            <div className="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center text-green-600"><Icon name="Ticket" /></div>
                                            <div>
                                                <p className="font-black text-sm">{v.title} {v.link && <Icon name="Link" className="w-3 h-3 inline ml-1 text-blue-500"/>}</p>
                                                <p className="text-[10px] text-gray-400 uppercase">{v.date} · {v.type} {v.fileName && '📎'}</p>
                                            </div>
                                        </div>
                                        <button onClick={async () => {
                                            const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                                            await FB_LIB.deleteDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/vouchers`, v.id));
                                        }} className="p-2 text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2"/></button>
                                    </div>
                                ))}
                                {vouchers.length === 0 && <p className="py-10 text-center opacity-20 font-black italic text-[#212121]">尚無憑證記錄</p>}
                            </div>
                        </div>
                    )}

                    {activeTab === 'planning' && (
                        <div className="px-6 animate-up text-[#212121]">
                            <div className="flex gap-2 mb-6 pt-2">
                                <button onClick={() => setPlanningMode('todo')} className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all border-2 ${planningMode === 'todo' ? 'bg-[#212121] text-white border-[#212121] shadow-lg' : 'bg-white text-gray-400 border-gray-100'}`}>待辦事項</button>
                                <button onClick={() => setPlanningMode('packing')} className={`flex-1 py-3 rounded-2xl font-black text-sm transition-all border-2 ${planningMode === 'packing' ? 'bg-[#212121] text-white border-[#212121] shadow-lg' : 'bg-white text-gray-400 border-gray-100'}`}>行李檢查</button>
                            </div>
                            
                            <form onSubmit={addTask} className="relative mb-8 text-left">
                                <input className="w-full p-5 pr-14 mickey-card font-black outline-none focus:border-[#D32F2F] transition-all bg-white" placeholder={planningMode === 'todo' ? "新增任務..." : "要帶什麼行李？"} value={newTaskInput} onChange={e => setNewTaskInput(e.target.value)} />
                                <button type="submit" className="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-[#D32F2F] text-white rounded-xl flex items-center justify-center mickey-btn z-10"><Icon name="Plus" color="white"/></button>
                            </form>

                            <div className="space-y-3 pb-10">
                                {planningTasks.filter(t => t.category === planningMode).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)).map(task => (
                                    <div key={task.id} className={`mickey-card p-4 flex items-center justify-between bg-white text-left ${task.completed ? 'opacity-40 grayscale border-dashed shadow-none scale-95' : 'shadow-md'}`}>
                                        <div className="flex items-center gap-4 cursor-pointer flex-1 text-left" onClick={() => toggleTask(task)}>
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${task.completed ? 'bg-green-500 border-green-500' : 'border-[#212121]'}`}>
                                                {task.completed && <Icon name="Check" className="w-3 h-3" color="white"/>}
                                            </div>
                                            <span className={`font-black tracking-tight ${task.completed ? 'line-through text-gray-400' : ''}`}>{task.title}</span>
                                        </div>
                                        <button onClick={async () => {
                                            const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                                            await FB_LIB.deleteDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/planningTasks`, task.id));
                                        }} className="p-2 text-red-300 hover:text-red-500 transition-colors"><Icon name="Trash2" className="w-4 h-4"/></button>
                                    </div>
                                ))}
                                {planningTasks.filter(t => t.category === planningMode).length === 0 && <p className="py-20 text-center opacity-10 font-black italic">清單目前是空的</p>}
                            </div>
                        </div>
                    )}

                    {/* 置中導覽列 */}
                    <div className="nav-container">
                        <div className="h-18 bg-white/95 backdrop-blur-xl rounded-[32px] border-2 border-[#212121] flex justify-around items-center shadow-2xl px-2 py-3">
                            {[
                                { id: 'schedule', icon: 'Calendar', label: '行程' },
                                { id: 'expense', icon: 'Wallet', label: '記帳' },
                                { id: 'bookings', icon: 'Ticket', label: '預訂' },
                                { id: 'planning', icon: 'ListTodo', label: '準備' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all flex-1 ${activeTab === t.id ? 'tab-active' : 'text-gray-300 hover:text-gray-400'}`}>
                                    <Icon name={t.icon} className="w-6 h-6" color="currentColor" />
                                    <span className="text-[9px] font-black uppercase tracking-widest leading-none mt-0.5">{t.label}</span>
                                    {activeTab === t.id && <div className="w-1 h-1 bg-[#D32F2F] rounded-full mt-0.5" />}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* --- Modals --- */}
                    <Modal isOpen={modalMode === 'add'} onClose={() => setModalMode(null)} title="新增奇妙行程">
                        <form onSubmit={handleSaveItem} className="space-y-4 text-left">
                            <MapPreview location={formData.location} />
                            <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">行程標題</label><input required className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="例如：抵達香港" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} /></div>
                            <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">地點搜尋</label><input className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="例如：香港國際機場" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} /></div>
                            <div className="grid grid-cols-2 gap-3 text-left">
                                <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">時間</label><input type="time" className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} /></div>
                                <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">類別</label><select className="w-full p-4 mickey-card font-black outline-none appearance-none bg-white text-[#212121]" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}><option value="spot">景點</option><option value="food">美食</option><option value="stay">住宿</option></select></div>
                            </div>
                            <button type="submit" className="w-full py-4 bg-[#D32F2F] text-white rounded-3xl font-black shadow-lg mickey-btn uppercase">Save Adventure</button>
                        </form>
                    </Modal>

                    <Modal isOpen={modalMode === 'addExpense' || modalMode === 'editExpense'} onClose={() => setModalMode(null)} title={modalMode === 'addExpense' ? "新增旅行支出" : "編輯支出項目"}>
                        <form onSubmit={handleSaveExpense} className="space-y-6">
                            <div className="text-center py-2">
                                <div className="flex justify-center gap-2 mb-6">
                                    {['HKD','MOP','TWD'].map(c => <button type="button" key={c} onClick={() => setExpenseFormData({...expenseFormData, currency: c})} className={`px-5 py-2 rounded-full font-black border-2 transition-all ${expenseFormData.currency === c ? 'bg-[#212121] text-white border-black' : 'bg-white text-gray-400 border-gray-100'}`}>{c}</button>)}
                                </div>
                                <div className="relative inline-block w-full text-[#212121]"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-black text-[#D32F2F] leading-none">$</span><input required type="number" className="w-full bg-transparent border-b-4 border-black text-center text-6xl font-black outline-none pb-4 focus:border-[#FFC107] transition-all" value={expenseFormData.amount} onChange={e => setExpenseFormData({...expenseFormData, amount: e.target.value})} /></div>
                                {expenseFormData.currency !== 'TWD' && <p className="text-[10px] font-bold text-gray-400 mt-2 italic text-center">≈ NT${Math.round(expenseFormData.amount * (exchangeRates[expenseFormData.currency] || 1))}</p>}
                            </div>

                            <div className="text-left">
                                <label className="block text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest ml-1">選擇類別</label>
                                <div className="grid grid-cols-5 gap-2">
                                    {Object.entries(expenseCats).map(([key, cat]) => (
                                        <button key={key} type="button" onClick={() => setExpenseFormData({...expenseFormData, category: key})} className={`flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all ${expenseFormData.category === key ? 'bg-[#212121] text-white border-[#212121] shadow-md' : 'bg-white border-gray-100 opacity-60'}`}>
                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${cat.color} text-white shadow-sm`}><Icon name={cat.icon} color="white" className="w-4 h-4" /></div>
                                            <span className={`text-[9px] font-black`}>{cat.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-4 text-left">
                                <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">支出名稱</label><input required className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="例如：義順牛奶公司" value={expenseFormData.title} onChange={e => setExpenseFormData({...expenseFormData, title: e.target.value})} /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">日期</label><select className="w-full p-4 mickey-card font-black bg-white appearance-none outline-none text-[#212121]" value={expenseFormData.date} onChange={e => setExpenseFormData({...expenseFormData, date: e.target.value})}><option value="2026-09-16">09/16</option><option value="2026-09-17">09/17</option><option value="2026-09-18">09/18</option><option value="2026-09-19">09/19</option></select></div>
                                    <div><label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">付款人</label><input className="w-full p-4 mickey-card font-black bg-white outline-none text-[#212121]" placeholder="Who paid?" value={expenseFormData.payer} onChange={e => setExpenseFormData({...expenseFormData, payer: e.target.value})} /></div>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {modalMode === 'editExpense' && <button type="button" onClick={async () => {
                                    const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                                    await FB_LIB.deleteDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/expenses`, selectedExpense.id));
                                    setModalMode(null);
                                }} className="w-16 h-16 bg-red-50 text-red-500 rounded-2xl border-2 border-red-100 flex items-center justify-center mickey-btn"><Icon name="Trash2" /></button>}
                                <button type="submit" className="flex-1 py-4 bg-[#D32F2F] text-white rounded-3xl font-black shadow-lg mickey-btn">確認儲存支出</button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={modalMode === 'addVoucher'} onClose={() => setModalMode(null)} title="新增票券憑證">
                        <form onSubmit={handleSaveVoucher} className="space-y-5 text-left text-[#212121]">
                            <input required className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="憑證名稱" value={voucherFormData.title} onChange={e => setVoucherFormData({...voucherFormData, title: e.target.value})} />
                            <div className="grid grid-cols-2 gap-3 text-[#212121]">
                                <input className="w-full p-4 mickey-card font-black bg-white outline-none" placeholder="日期 MM/DD" value={voucherFormData.date} onChange={e => setVoucherFormData({...voucherFormData, date: e.target.value})} />
                                <select className="w-full p-4 mickey-card font-black bg-white appearance-none outline-none" value={voucherFormData.type} onChange={e => setVoucherFormData({...voucherFormData, type: e.target.value})}><option value="QR Code">QR Code</option><option value="PDF 檔案">PDF 檔案</option><option value="紙本">紙本</option><option value="網頁">網頁</option></select>
                            </div>
                            <input className="w-full p-4 mickey-card font-black bg-white outline-none text-[#212121]" placeholder="連結 https://..." value={voucherFormData.link} onChange={e => setVoucherFormData({...voucherFormData, link: e.target.value})} />
                            
                            {/* 檔案上傳 UI */}
                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*,.pdf" onChange={handleFileChange} />
                            {!voucherFormData.fileInfo ? (
                                <div onClick={() => fileInputRef.current.click()} className="p-10 border-2 border-dashed border-[#212121]/20 rounded-[32px] bg-white flex flex-col items-center justify-center gap-3 cursor-pointer active:bg-[#FFC107]/5 transition-all text-[#212121]">
                                    <Icon name="FileUp" className="w-7 h-7" color="#FFC107" />
                                    <p className="text-[11px] font-black text-gray-500 uppercase tracking-widest">點擊選取照片或檔案</p>
                                </div>
                            ) : (
                                <div className="p-5 border-2 border-[#D32F2F] rounded-[24px] bg-white flex items-center justify-between shadow-md">
                                    <div className="flex items-center gap-4 text-[#212121] text-left">
                                        <div className="w-12 h-12 bg-[#D32F2F]/10 rounded-2xl flex items-center justify-center text-[#D32F2F]">{voucherFormData.fileInfo.type.includes('image') ? <Icon name="Image" color="#D32F2F"/> : <Icon name="FileText" color="#D32F2F"/>}</div>
                                        <div className="max-w-[180px]"><p className="font-black text-xs truncate">{voucherFormData.fileInfo.name}</p><p className="text-[10px] font-bold text-gray-400">{voucherFormData.fileInfo.size}</p></div>
                                    </div>
                                    <button type="button" onClick={() => setVoucherFormData({ ...voucherFormData, fileInfo: null })} className="w-10 h-10 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center mickey-btn"><Icon name="X" /></button>
                                </div>
                            )}
                            <button type="submit" className="w-full py-4 bg-[#D32F2F] text-white rounded-3xl font-black shadow-lg mickey-btn uppercase">Save Voucher</button>
                        </form>
                    </Modal>

                    <Modal isOpen={modalMode === 'editHotel'} onClose={() => setModalMode(null)} title="編輯飯店手帳">
                        <form onSubmit={handleSaveHotel} className="space-y-4 text-left">
                            <MapPreview location={hotelFormData.address} />
                            <input required className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="飯店名稱" value={hotelFormData.name || ''} onChange={e => setHotelFormData({...hotelFormData, name: e.target.value})} />
                            <input className="w-full p-4 mickey-card font-black outline-none bg-white text-[#212121]" placeholder="地址" value={hotelFormData.address || ''} onChange={e => setHotelFormData({...hotelFormData, address: e.target.value})} />
                            <div className="grid grid-cols-2 gap-3 text-left text-[#212121]">
                                <input className="w-full p-4 mickey-card font-black bg-white outline-none" placeholder="Check-In MM/DD" value={hotelFormData.checkIn || ''} onChange={e => setHotelFormData({...hotelFormData, checkIn: e.target.value})} />
                                <input className="w-full p-4 mickey-card font-black bg-white outline-none" placeholder="Check-Out MM/DD" value={hotelFormData.checkOut || ''} onChange={e => setHotelFormData({...hotelFormData, checkOut: e.target.value})} />
                            </div>
                            <button type="submit" className="w-full py-4 bg-black text-white rounded-3xl font-black shadow-lg mickey-btn">儲存資訊</button>
                        </form>
                    </Modal>

                    <Modal isOpen={modalMode === 'detail'} onClose={() => setModalMode(null)} title="行程詳情">
                        {selectedItem && (
                            <div className="space-y-6 text-left text-[#212121]">
                                <h3 className="text-3xl font-black text-[#212121] text-left">{selectedItem.title}</h3>
                                <MapPreview location={selectedItem.location}/>
                                <div className="p-5 bg-white mickey-card border-l-[12px] border-[#FFC107] italic text-gray-600 leading-relaxed shadow-sm text-left">“ {selectedItem.note || '未填寫心情筆記...'} ”</div>
                                <button onClick={async () => { 
                                    const { FB_LIB } = window; const db = FB_LIB.getFirestore();
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mickey-v1';
                                    await FB_LIB.deleteDoc(FB_LIB.doc(db, `artifacts/${appId}/users/${user.uid}/itinerary`, selectedItem.id)); 
                                    setModalMode(null); 
                                }} className="w-full py-4 bg-red-50 text-red-500 font-black rounded-3xl border-2 border-red-100 flex items-center justify-center gap-2 mickey-btn"><Icon name="Trash2" color="#ef4444" /> 刪除此行程</button>
                            </div>
                        )}
                    </Modal>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
