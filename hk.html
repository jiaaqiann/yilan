<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港澳復古旅遊規劃 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase 配置 (環境自動注入或預設) ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: ""
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hk-mo-travel-demo';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 狀態管理 ---
        let currentUser = null;
        const state = {
            currentPage: 'home',
            currency: 'HKD',
            rate: 4.15
        };

        // --- 初始化 Auth ---
        signInAnonymously(auth).catch(err => console.error("Auth Error", err));
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                initDataListeners();
            }
        });

        // --- 切換分頁邏輯 ---
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo(0, 0);
        };

        // --- 匯率計算 ---
        window.updateRate = () => {
            const amount = document.getElementById('calc-input').value;
            const resDisplay = document.getElementById('calc-result');
            const total = Math.round(amount * state.rate);
            resDisplay.innerText = `約 NT$ ${total || 0}`;
        };

        window.toggleCurrency = (type) => {
            state.currency = type;
            state.rate = type === 'HKD' ? 4.15 : 4.02;
            document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('bg-white', 'text-black'));
            event.target.classList.add('bg-white', 'text-black');
            updateRate();
        };

        // --- Firebase 資料儲存 ---
        window.saveExpense = async () => {
            const amount = document.getElementById('calc-input').value;
            if (!amount || !currentUser) return;
            
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), {
                amount: parseFloat(amount),
                currency: state.currency,
                twd: Math.round(amount * state.rate),
                timestamp: serverTimestamp(),
                uid: currentUser.uid
            });
            document.getElementById('calc-input').value = '';
            alert('已成功存入雲端！');
        };

        // --- 資料監聽 ---
        function initDataListeners() {
            // 監聽支出
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), (snapshot) => {
                const list = document.getElementById('expense-list');
                list.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "bg-white border-4 border-black rounded-2xl p-4 shadow-[4px_4px_0px_#000] flex justify-between items-center mb-4";
                    item.innerHTML = `
                        <div>
                            <span class="font-black text-lg">${data.currency} ${data.amount}</span>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">已同步</p>
                        </div>
                        <div class="text-2xl font-black text-[#00A373] italic text-right">NT$ ${data.twd}</div>
                    `;
                    list.appendChild(item);
                });
            });
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        
        body {
            background-color: #FDF5E6;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .neo-card {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #000;
            transition: all 0.1s;
        }

        .neo-card:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px 0px #000;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x-4 border-black relative">

    <!-- 1. 首頁 (Home) -->
    <div id="home" class="page p-6 pb-32">
        <h1 class="text-4xl font-black italic mb-8 tracking-tighter uppercase">
            <span class="bg-red-500 text-white px-3 py-1 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000]">HK MO</span>
            2026 ✈️
        </h1>

        <div class="grid grid-cols-3 gap-4">
            <!-- 行程卡片 (Hero) -->
            <div onclick="showPage('itinerary')" class="neo-card col-span-2 bg-red-500 text-white p-6 h-48 rounded-[32px] flex flex-col justify-end">
                <div class="mb-auto text-4xl">📅</div>
                <div>
                    <span class="text-3xl font-black block leading-none">行程表</span>
                    <span class="text-sm font-bold opacity-80 italic">TIMELINE</span>
                </div>
            </div>

            <!-- 記帳本 -->
            <div onclick="showPage('ledger')" class="neo-card bg-[#00A373] text-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <div class="text-3xl mb-1">🧮</div>
                <span class="text-xl font-black">記帳</span>
            </div>

            <!-- 行李 -->
            <div class="neo-card bg-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <div class="text-3xl mb-1">🧳</div>
                <span class="text-lg font-black">行李</span>
            </div>

            <!-- 伴手禮 -->
            <div class="neo-card bg-yellow-400 flex flex-col items-center justify-center p-4 rounded-[32px]">
                <div class="text-3xl mb-1">🎁</div>
                <span class="text-lg font-black">伴手禮</span>
            </div>

            <!-- 設定 -->
            <div class="neo-card bg-black text-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <div class="text-3xl mb-1">⚙️</div>
                <span class="text-lg font-black">設定</span>
            </div>
        </div>

        <!-- 匯率看板 -->
        <div class="neo-card mt-8 p-6 bg-white rounded-[32px] flex items-center justify-between">
            <div>
                <h4 class="font-black text-gray-400 text-xs">CURRENT RATE</h4>
                <p class="font-black text-xl italic">1 HKD = 4.15 TWD</p>
            </div>
            <div class="w-12 h-12 bg-yellow-400 rounded-full border-4 border-black flex items-center justify-center shadow-[3px_3px_0px_#000] text-xl">
                💰
            </div>
        </div>
    </div>

    <!-- 2. 行程頁面 (Itinerary) -->
    <div id="itinerary" class="page hidden p-6 pb-32">
        <button onclick="showPage('home')" class="mb-6 flex items-center font-black text-xl italic">
            ⬅ 返回首頁
        </button>
        
        <div class="flex overflow-x-auto gap-3 pb-6 no-scrollbar">
            <div class="flex-shrink-0 px-8 py-3 border-4 border-black rounded-full font-black text-lg bg-red-500 text-white shadow-[4px_4px_0px_#000]">DAY 1</div>
            <div class="flex-shrink-0 px-8 py-3 border-4 border-black rounded-full font-black text-lg bg-white shadow-[4px_4px_0px_#000]">DAY 2</div>
            <div class="flex-shrink-0 px-8 py-3 border-4 border-black rounded-full font-black text-lg bg-white shadow-[4px_4px_0px_#000]">DAY 3</div>
        </div>

        <h2 class="text-3xl font-black mb-8 italic">📍 時間軸行程</h2>
        <div class="border-l-8 border-black ml-4 pl-10 space-y-10 relative">
            <div class="neo-card bg-white p-5 rounded-[24px] relative">
                <div class="absolute -left-[54px] top-6 w-8 h-8 bg-white border-4 border-black rounded-full shadow-[2px_2px_0px_#000]"></div>
                <span class="bg-black text-white px-3 py-1 rounded-lg font-black text-xs mb-2 inline-block">10:00</span>
                <h3 class="text-2xl font-black">抵達香港機場</h3>
                <p class="text-gray-500 font-bold">辦理入境與領取八達通</p>
            </div>
            <div class="neo-card bg-white p-5 rounded-[24px] relative">
                <div class="absolute -left-[54px] top-6 w-8 h-8 bg-white border-4 border-black rounded-full shadow-[2px_2px_0px_#000]"></div>
                <span class="bg-black text-white px-3 py-1 rounded-lg font-black text-xs mb-2 inline-block">12:30</span>
                <h3 class="text-2xl font-black">添好運飲茶</h3>
                <p class="text-gray-500 font-bold">尖沙咀店用餐</p>
            </div>
        </div>
    </div>

    <!-- 3. 記帳頁面 (Ledger) -->
    <div id="ledger" class="page hidden p-6 pb-32">
        <button onclick="showPage('home')" class="mb-6 flex items-center font-black text-xl italic">
            ⬅ 返回
        </button>

        <div class="bg-yellow-400 border-4 border-black rounded-[32px] p-8 shadow-[10px_10px_0px_#000] mb-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-2xl italic underline uppercase">計算機</h3>
                <div class="flex bg-black p-1 rounded-2xl">
                    <button onclick="toggleCurrency('HKD')" class="curr-btn px-4 py-1 rounded-xl font-black text-sm bg-white text-black">HKD</button>
                    <button onclick="toggleCurrency('MOP')" class="curr-btn px-4 py-1 rounded-xl font-black text-sm text-white">MOP</button>
                </div>
            </div>

            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 font-black text-3xl">$</span>
                <input id="calc-input" type="number" placeholder="0.00" oninput="updateRate()" class="w-full border-4 border-black rounded-2xl p-4 pl-12 text-3xl font-black outline-none bg-white">
            </div>

            <div class="flex justify-between items-center px-2 mb-6">
                <span class="font-black text-gray-700 italic">換算台幣約</span>
                <span id="calc-result" class="text-4xl font-black italic">NT$ 0</span>
            </div>

            <button onclick="saveExpense()" class="w-full bg-black text-white p-5 rounded-[24px] font-black text-2xl shadow-[6px_6px_0px_#00A373] active:translate-y-1 active:shadow-none transition-all">
                存入帳本 💰
            </button>
        </div>

        <h3 class="text-2xl font-black mb-6 italic border-b-8 border-black inline-block uppercase">近期開支</h3>
        <div id="expense-list" class="space-y-4">
            <!-- 動態載入 -->
        </div>
    </div>

    <!-- 全域懸浮按鈕 (計算機) -->
    <div onclick="showPage('ledger')" class="fixed bottom-32 right-8 w-16 h-16 bg-[#00A373] border-4 border-black rounded-[24px] shadow-[6px_6px_0px_#000] flex items-center justify-center cursor-pointer active:scale-90 z-40 text-3xl">
        💲
    </div>

    <!-- 底部新增按鈕 -->
    <div class="fixed bottom-0 left-0 right-0 p-8 flex justify-center z-30 pointer-events-none">
        <button onclick="alert('新增功能：行程/支出')" class="w-full max-w-xs bg-black text-white border-4 border-black rounded-[24px] px-8 py-5 font-black shadow-[6px_6px_0px_#00A373] active:translate-y-1 active:shadow-none transition-all pointer-events-auto text-xl">
            ＋ 新增行程 / 紀錄
        </button>
    </div>

</body>
</html>
