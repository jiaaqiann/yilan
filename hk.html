!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港澳復古旅遊規劃 App</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖示 (像 Canva 的專業圖示) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        
        body {
            background-color: #FDF5E6; /* 復古米色背景 */
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 核心設計：硬陰影卡片 */
        .neo-card {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px 0px #000;
            transition: all 0.1s;
            cursor: pointer;
        }

        /* 按下去的下陷效果 */
        .neo-card:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px 0px #000;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .page { transition: opacity 0.3s ease; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase 配置 ---
        // 注意：如果你要在自己的 GitHub 使用，請將下面的 config 換成你在 Firebase 控制台取得的內容
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", 
            authDomain: "", 
            projectId: "", 
            storageBucket: "", 
            messagingSenderId: "", 
            appId: ""
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hk-mo-travel-demo';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 狀態
        let currentUser = null;
        let state = {
            currency: 'HKD',
            rate: 4.15
        };

        // 初始化
        signInAnonymously(auth).catch(err => console.error("驗證失敗", err));
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) initDataListeners();
        });

        // 全域函數
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo(0, 0);
            lucide.createIcons(); // 確保新頁面的圖示有被渲染
        };

        window.updateRate = () => {
            const amount = document.getElementById('calc-input').value;
            const resDisplay = document.getElementById('calc-result');
            const total = Math.round(amount * state.rate);
            resDisplay.innerText = `約 NT$ ${total || 0}`;
        };

        window.toggleCurrency = (type) => {
            state.currency = type;
            state.rate = type === 'HKD' ? 4.15 : 4.02;
            document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('bg-white', 'text-black'));
            event.target.classList.add('bg-white', 'text-black');
            updateRate();
        };

        window.saveExpense = async () => {
            const amount = document.getElementById('calc-input').value;
            if (!amount || !currentUser) return;
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), {
                    amount: parseFloat(amount),
                    currency: state.currency,
                    twd: Math.round(amount * state.rate),
                    timestamp: serverTimestamp(),
                    uid: currentUser.uid
                });
                document.getElementById('calc-input').value = '';
                alert('已同步到雲端！');
                showPage('home');
            } catch (e) {
                alert('儲存失敗，請檢查 Firebase 設定');
            }
        };

        function initDataListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), (snapshot) => {
                const list = document.getElementById('expense-list');
                if(!list) return;
                list.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "bg-white border-4 border-black rounded-2xl p-4 shadow-[4px_4px_0px_#000] flex justify-between items-center mb-4";
                    item.innerHTML = `
                        <div>
                            <span class="font-black text-lg">${data.currency} ${data.amount}</span>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">已即時同步</p>
                        </div>
                        <div class="text-2xl font-black text-[#00A373] italic text-right">NT$ ${data.twd}</div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</head>
<body class="max-w-md mx-auto min-h-screen border-x-4 border-black relative bg-[#FDF5E6]">

    <!-- 1. 首頁 (Home) -->
    <div id="home" class="page p-6 pb-40">
        <h1 class="text-4xl font-black italic mb-10 tracking-tighter uppercase">
            <span class="bg-red-500 text-white px-3 py-1 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000]">HK MO</span>
            2026 ✈️
        </h1>

        <div class="grid grid-cols-3 gap-5">
            <!-- 行程卡片 (Hero) -->
            <div onclick="showPage('itinerary')" class="neo-card col-span-2 bg-red-500 text-white p-6 h-56 rounded-[32px] flex flex-col justify-end relative">
                <i data-lucide="map" class="absolute top-6 left-6 w-14 h-14 stroke-[3]"></i>
                <div>
                    <span class="text-3xl font-black block leading-none">行程表</span>
                    <span class="text-sm font-bold opacity-80 italic uppercase tracking-widest">Timeline</span>
                </div>
            </div>

            <!-- 記帳本 -->
            <div onclick="showPage('ledger')" class="neo-card bg-[#00A373] text-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <i data-lucide="calculator" class="w-12 h-12 mb-2 stroke-[3]"></i>
                <span class="text-xl font-black">記帳</span>
            </div>

            <!-- 行李 -->
            <div class="neo-card bg-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <i data-lucide="luggage" class="w-10 h-10 mb-1 text-black stroke-[3]"></i>
                <span class="text-lg font-black">行李</span>
            </div>

            <!-- 伴手禮 -->
            <div class="neo-card bg-yellow-400 flex flex-col items-center justify-center p-4 rounded-[32px]">
                <i data-lucide="gift" class="w-10 h-10 mb-1 text-black stroke-[3]"></i>
                <span class="text-lg font-black">伴手禮</span>
            </div>

            <!-- 設定 -->
            <div class="neo-card bg-black text-white flex flex-col items-center justify-center p-4 rounded-[32px]">
                <i data-lucide="settings" class="w-10 h-10 mb-1 stroke-[3]"></i>
                <span class="text-lg font-black">設定</span>
            </div>
        </div>

        <!-- 匯率看板 -->
        <div class="neo-card mt-10 p-6 bg-white rounded-[32px] flex items-center justify-between">
            <div>
                <h4 class="font-black text-gray-400 text-xs">MARKET RATE</h4>
                <p class="font-black text-2xl italic">1 HKD = 4.15 TWD</p>
            </div>
            <div class="w-16 h-16 bg-yellow-400 rounded-full border-4 border-black flex items-center justify-center shadow-[4px_4px_0px_#000]">
                <i data-lucide="banknote" class="w-8 h-8 text-black stroke-[3]"></i>
            </div>
        </div>
    </div>

    <!-- 2. 行程頁面 (Itinerary) -->
    <div id="itinerary" class="page hidden p-6 pb-40">
        <button onclick="showPage('home')" class="mb-8 flex items-center font-black text-xl italic group">
            <i data-lucide="arrow-left" class="mr-2 group-active:-translate-x-2 transition-transform"></i> 返回首頁
        </button>
        
        <div class="flex overflow-x-auto gap-4 pb-8 no-scrollbar">
            <div class="flex-shrink-0 px-10 py-4 border-4 border-black rounded-full font-black text-xl bg-red-500 text-white shadow-[4px_4px_0px_#000]">DAY 1</div>
            <div class="flex-shrink-0 px-10 py-4 border-4 border-black rounded-full font-black text-xl bg-white shadow-[4px_4px_0px_#000]">DAY 2</div>
            <div class="flex-shrink-0 px-10 py-4 border-4 border-black rounded-full font-black text-xl bg-white shadow-[4px_4px_0px_#000]">DAY 3</div>
        </div>

        <h2 class="text-3xl font-black mb-10 italic flex items-center gap-3">
            <i data-lucide="milestone" class="text-red-500 w-10 h-10"></i> 行程亮點
        </h2>
        
        <div class="border-l-8 border-black ml-5 pl-12 space-y-12 relative">
            <div class="neo-card bg-white p-6 rounded-[28px] relative">
                <div class="absolute -left-[60px] top-8 w-10 h-10 bg-white border-4 border-black rounded-full shadow-[3px_3px_0px_#000] flex items-center justify-center">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                </div>
                <span class="bg-black text-white px-4 py-1 rounded-xl font-black text-sm mb-3 inline-block">10:00</span>
                <h3 class="text-2xl font-black">抵達香港機場</h3>
                <p class="text-gray-500 font-bold mt-2">領取八達通並搭乘機場快線</p>
            </div>
            <div class="neo-card bg-white p-6 rounded-[28px] relative">
                <div class="absolute -left-[60px] top-8 w-10 h-10 bg-white border-4 border-black rounded-full shadow-[3px_3px_0px_#000] flex items-center justify-center">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                </div>
                <span class="bg-black text-white px-4 py-1 rounded-xl font-black text-sm mb-3 inline-block">12:30</span>
                <h3 class="text-2xl font-black">添好運飲茶</h3>
                <p class="text-gray-500 font-bold mt-2">在地老字號點心美味</p>
            </div>
        </div>
    </div>

    <!-- 3. 記帳頁面 (Ledger) -->
    <div id="ledger" class="page hidden p-6 pb-40">
        <button onclick="showPage('home')" class="mb-8 flex items-center font-black text-xl italic group">
            <i data-lucide="arrow-left" class="mr-2 group-active:-translate-x-2 transition-transform"></i> 返回
        </button>

        <div class="bg-yellow-400 border-4 border-black rounded-[40px] p-10 shadow-[12px_12px_0px_#000] mb-12">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-black text-2xl italic underline uppercase">即時記帳</h3>
                <div class="flex bg-black p-1.5 rounded-2xl">
                    <button onclick="toggleCurrency('HKD')" class="curr-btn px-5 py-2 rounded-xl font-black text-sm bg-white text-black transition-all">HKD</button>
                    <button onclick="toggleCurrency('MOP')" class="curr-btn px-5 py-2 rounded-xl font-black text-sm text-white transition-all">MOP</button>
                </div>
            </div>

            <div class="relative mb-8">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-3xl text-black">
                    <i data-lucide="dollar-sign" class="w-10 h-10 stroke-[4]"></i>
                </span>
                <input id="calc-input" type="number" placeholder="0.00" oninput="updateRate()" class="w-full border-4 border-black rounded-3xl p-6 pl-16 text-4xl font-black outline-none bg-white">
            </div>

            <div class="flex justify-between items-center px-2 mb-8">
                <span class="font-black text-gray-800 italic text-lg">預估台幣</span>
                <span id="calc-result" class="text-5xl font-black italic">NT$ 0</span>
            </div>

            <button onclick="saveExpense()" class="w-full bg-black text-white p-6 rounded-[32px] font-black text-2xl shadow-[8px_8px_0px_#00A373] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-3">
                <i data-lucide="cloud-upload" class="w-8 h-8"></i> 存入雲端
            </button>
        </div>

        <h3 class="text-2xl font-black mb-8 italic border-b-8 border-black inline-block uppercase">同步清單</h3>
        <div id="expense-list" class="space-y-5">
            <!-- 動態載入 -->
        </div>
    </div>

    <!-- 全域懸浮按鈕 -->
    <div onclick="showPage('ledger')" class="fixed bottom-36 right-8 w-20 h-20 bg-[#00A373] border-4 border-black rounded-[28px] shadow-[8px_8px_0px_#000] flex items-center justify-center cursor-pointer active:scale-90 z-40 transition-transform">
        <i data-lucide="calculator" class="text-white w-10 h-10 stroke-[3]"></i>
    </div>

    <!-- 底部長條按鈕 -->
    <div class="fixed bottom-0 left-0 right-0 p-10 flex justify-center z-30 pointer-events-none">
        <button onclick="alert('開啟新增選單')" class="w-full max-w-sm bg-black text-white border-4 border-black rounded-[32px] px-10 py-6 font-black shadow-[8px_8px_0px_#00A373] active:translate-y-2 active:shadow-none transition-all pointer-events-auto text-2xl flex items-center justify-center gap-3">
            <i data-lucide="plus" class="stroke-[4] w-8 h-8"></i> 新增紀錄
        </button>
    </div>

</body>
</html>
