<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      /* 修改 .card 樣式，讓所有卡片和按鈕都變圓弧 */
.card {
    /* 1. 核心屬性：設定圓角半徑，數值越大越圓 */
    border-radius: 20px; /* 你可以試著改成 8px 或 20px 看看不同效果 */
    
    /* 以下是你原本有的樣式，我稍微整理了一下 */
    border: 4px solid blue;
    background: #fff;
    padding: 1rem;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: 0.1s;
    user-select: none; /* 防止文字被選取，像個按鈕 */
}

/* 為了讓按鈕點擊時看起來更真實，也稍微調整一下它的圓角效果 */
.card.active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 2px #333;
}
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h1>港澳 2026 ✈️</h1>
        <div class="magazine-grid">
            <div class="card hero" onclick="showPage('itinerary')">行程表</div>
            <div class="card" style="background:#00A373; color:#fff;" onclick="showPage('calc')">記帳</div>
            <div class="card" onclick="alert('行李清單製作中')">行李</div>
            <div class="card" onclick="alert('伴手禮清單製作中')">伴手禮</div>
            <div class="card" style="background:#FFD700;">設定</div>
        </div>
    </div>

    <div id="itinerary" class="page">
        <div class="card" onclick="showPage('home')" style="display:inline-block; margin-bottom:10px;">⬅ 返回</div>
        <h2>📅 行程時間軸</h2>
        <div class="card">10:00 抵達香港機場</div>
        <br>
        <div class="card">12:00 添好運飲茶</div>
    </div>

    <div id="calc" class="page">
        <div class="card" onclick="showPage('home')" style="display:inline-block; margin-bottom:10px;">⬅ 返回</div>
        <div class="card" style="background:#FFD700;">
            <h3>匯率換算</h3>
            <input type="number" id="hkd" placeholder="輸入港幣" style="width:80%; padding:10px;" oninput="updateRate()">
            <p id="twd">台幣約：NT$ 0</p>
        </div>
    </div>

    <button class="bottom-btn" onclick="alert('你要新增什麼呢？')">＋ 新增行程 / 項目</button>

    <script>
        // 控制頁面切換的「大腦」
        function showPage(pageId) {
            // 隱藏所有頁面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // 顯示被點擊的頁面
            document.getElementById(pageId).classList.add('active');
        }

        function updateRate() {
            const val = document.getElementById('hkd').value;
            document.getElementById('twd').innerText = "台幣約：NT$ " + Math.round(val * 4.1);
        }
    </script>
</body>
</html>
